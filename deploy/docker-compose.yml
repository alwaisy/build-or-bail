services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: buildorbail:latest
    container_name: buildorbail
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-5897}:5897"
    env_file:
      - ../.env
    environment:
      - PORT=5897
      - GOOGLE_APPLICATION_CREDENTIALS=/app/google-creds.json
    volumes:
      - ../google-creds.json:/app/google-creds.json:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5897/api/config"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
